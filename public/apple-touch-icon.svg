<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C3BFF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#080B14"/>
  <rect width="180" height="180" rx="40" fill="url(#bg)" opacity="0.2"/>
  <!-- Outer glow ring -->
  <circle cx="90" cy="90" r="70" stroke="url(#bg)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Mid ring -->
  <circle cx="90" cy="90" r="50" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none"/>
  <!-- Inner ring -->
  <circle cx="90" cy="90" r="30" stroke="url(#bg)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Core dot -->
  <circle cx="90" cy="90" r="12" fill="url(#bg)"/>
  <circle cx="90" cy="90" r="6" fill="white" fill-opacity="0.95"/>
  <!-- Crosshair arms -->
  <line x1="90" y1="15" x2="90" y2="52" stroke="url(#bg)" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="128" x2="90" y2="165" stroke="url(#bg)" stroke-width="3" stroke-linecap="round"/>
  <line x1="15" y1="90" x2="52" y2="90" stroke="url(#bg)" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="90" x2="165" y2="90" stroke="url(#bg)" stroke-width="3" stroke-linecap="round"/>
  <!-- Corner accent dots -->
  <circle cx="90" cy="20" r="3" fill="#00D9FF" opacity="0.8"/>
  <circle cx="90" cy="160" r="3" fill="#00D9FF" opacity="0.8"/>
  <circle cx="20" cy="90" r="3" fill="#6C3BFF" opacity="0.8"/>
  <circle cx="160" cy="90" r="3" fill="#6C3BFF" opacity="0.8"/>
</svg>
