<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d1f49;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141530;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d55;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9ff00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2b1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1d14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3173;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d1f49;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle">
      <circle cx="120" cy="120" r="116"/>
    </clipPath>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="120" cy="120" r="120" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="40" x2="240" y2="40"/>
    <line x1="0" y1="80" x2="240" y2="80"/>
    <line x1="0" y1="120" x2="240" y2="120"/>
    <line x1="0" y1="160" x2="240" y2="160"/>
    <line x1="0" y1="200" x2="240" y2="200"/>
    <line x1="40" y1="0" x2="40" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
  </g>

  <!-- Clipped content -->
  <g clip-path="url(#circle)">
    <!-- Shirt / torso (visible at bottom) -->
    <path d="M60,200 Q80,168 120,162 Q160,168 180,200 L200,240 L40,240 Z" fill="url(#shirtGrad)"/>
    <!-- Collar -->
    <path d="M105,162 L120,178 L135,162 Q128,158 120,157 Q112,158 105,162 Z" fill="#ffffff" opacity="0.15"/>

    <!-- Neck -->
    <rect x="107" y="148" width="26" height="18" rx="8" fill="url(#skinGrad)"/>

    <!-- Head -->
    <ellipse cx="120" cy="120" rx="46" ry="50" fill="url(#skinGrad)"/>

    <!-- Hair — top and sides -->
    <path d="M74,110 Q72,78 90,66 Q104,56 120,55 Q136,56 150,66 Q168,78 166,110 Q164,92 152,82 Q140,72 120,71 Q100,72 88,82 Q76,92 74,110 Z" fill="url(#hairGrad)"/>
    <!-- Hair sides / temple -->
    <path d="M74,110 Q72,96 76,88 Q78,84 80,86 Q78,96 78,108 Z" fill="url(#hairGrad)"/>
    <path d="M166,110 Q168,96 164,88 Q162,84 160,86 Q162,96 162,108 Z" fill="url(#hairGrad)"/>

    <!-- Left ear -->
    <ellipse cx="74" cy="122" rx="7" ry="9" fill="url(#skinGrad)"/>
    <!-- Right ear -->
    <ellipse cx="166" cy="122" rx="7" ry="9" fill="url(#skinGrad)"/>

    <!-- Eyebrows -->
    <path d="M95,103 Q103,99 111,101" stroke="#3d2b1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M129,101 Q137,99 145,103" stroke="#3d2b1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <!-- Left eye white -->
    <ellipse cx="103" cy="113" rx="9" ry="7" fill="white"/>
    <!-- Right eye white -->
    <ellipse cx="137" cy="113" rx="9" ry="7" fill="white"/>
    <!-- Left iris -->
    <circle cx="103" cy="113" r="5" fill="#4a3728"/>
    <!-- Right iris -->
    <circle cx="137" cy="113" r="5" fill="#4a3728"/>
    <!-- Left pupil -->
    <circle cx="104" cy="113" r="2.5" fill="#1a0f0a"/>
    <!-- Right pupil -->
    <circle cx="138" cy="113" r="2.5" fill="#1a0f0a"/>
    <!-- Eye shine left -->
    <circle cx="105" cy="111" r="1.2" fill="white" opacity="0.9"/>
    <!-- Eye shine right -->
    <circle cx="139" cy="111" r="1.2" fill="white" opacity="0.9"/>
    <!-- Upper eyelid left -->
    <path d="M94,109 Q103,106 112,109" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
    <!-- Upper eyelid right -->
    <path d="M128,109 Q137,106 146,109" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>

    <!-- Nose -->
    <path d="M117,118 Q115,127 113,130 Q117,133 120,133 Q123,133 127,130 Q125,127 123,118" stroke="#d49070" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>

    <!-- Mouth — slight smile -->
    <path d="M109,142 Q115,147 120,148 Q125,147 131,142" stroke="#c27050" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Lower lip hint -->
    <path d="M113,148 Q120,152 127,148" stroke="#c27050" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- Subtle cheek warmth -->
    <ellipse cx="94" cy="134" rx="10" ry="6" fill="#ff8060" opacity="0.12"/>
    <ellipse cx="146" cy="134" rx="10" ry="6" fill="#ff8060" opacity="0.12"/>
  </g>

  <!-- Border ring with brand gradient -->
  <circle cx="120" cy="120" r="116" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.7"/>
  <!-- Inner subtle ring -->
  <circle cx="120" cy="120" r="113" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
