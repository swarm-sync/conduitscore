  <!-- ── Top connector plug ── -->
  <rect x="115" y="22" width="10" height="8" rx="1.5" fill="#CC002E" stroke="#FF3060" stroke-width="1"/>
  <rect x="117.5" y="16" width="5" height="7" rx="1" fill="#FF3060"/>
  <line x1="117.5" y1="19" x2="117.5" y2="22" stroke="#FF3060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="122.5" y1="19" x2="122.5" y2="22" stroke="#FF3060" stroke-width="1.2" stroke-linecap="round"/>
