<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="ConduitScore mark">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF2060"/>
      <stop offset="30%"  stop-color="#CC0040"/>
      <stop offset="60%"  stop-color="#8A001E"/>
      <stop offset="100%" stop-color="#3A0008"/>
    </radialGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="50%"  stop-color="#FF80CC"/>
      <stop offset="100%" stop-color="#FF204080"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Ring 5 (outermost) R=92 ── -->
