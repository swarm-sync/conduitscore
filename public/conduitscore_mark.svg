<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" fill="none">
  <defs>
    <linearGradient id="g1" x1="280" y1="700" x2="1120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb7d8"/>
      <stop offset="35%" stop-color="#ff2f7e"/>
      <stop offset="70%" stop-color="#ff0048"/>
      <stop offset="100%" stop-color="#8d2bff"/>
    </linearGradient>
    <linearGradient id="g2" x1="420" y1="760" x2="980" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e0b56"/>
      <stop offset="50%" stop-color="#ff165d"/>
      <stop offset="100%" stop-color="#b23cff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .brand { font-family: Orbitron, Eurostile, Rajdhani, Arial, sans-serif; font-weight: 800; letter-spacing: -1px; }
      .sub { font-family: Inter, Arial, sans-serif; font-weight: 600; letter-spacing: 0.4px; }
    </style>
  </defs>

  <g filter="url(#glow)">
    <!-- outer conduit arms -->
    <g stroke="url(#g1)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 700 112 C 774 137, 842 179, 901 238 C 927 264, 946 294, 952 332" />
      <g transform="rotate(60 700 360)"><path d="M 700 112 C 774 137, 842 179, 901 238 C 927 264, 946 294, 952 332" /></g>
      <g transform="rotate(120 700 360)"><path d="M 700 112 C 774 137, 842 179, 901 238 C 927 264, 946 294, 952 332" /></g>
      <g transform="rotate(180 700 360)"><path d="M 700 112 C 774 137, 842 179, 901 238 C 927 264, 946 294, 952 332" /></g>
      <g transform="rotate(240 700 360)"><path d="M 700 112 C 774 137, 842 179, 901 238 C 927 264, 946 294, 952 332" /></g>
      <g transform="rotate(300 700 360)"><path d="M 700 112 C 774 137, 842 179, 901 238 C 927 264, 946 294, 952 332" /></g>
    </g>

    <!-- nested hexagons -->
    <polygon points="700.0,150.0 881.9,255.0 881.9,465.0 700.0,570.0 518.1,465.0 518.1,255.0" stroke="url(#g2)" stroke-width="28" stroke-linejoin="round"/>
    <polygon points="700.0,205.0 834.2,282.5 834.2,437.5 700.0,515.0 565.8,437.5 565.8,282.5" stroke="url(#g1)" stroke-width="24" stroke-linejoin="round"/>
    <polygon points="700.0,256.0 790.1,308.0 790.1,412.0 700.0,464.0 609.9,412.0 609.9,308.0" stroke="url(#g2)" stroke-width="22" stroke-linejoin="round"/>
    <polygon points="700.0,296.0 755.4,328.0 755.4,392.0 700.0,424.0 644.6,392.0 644.6,328.0" stroke="url(#g1)" stroke-width="18" stroke-linejoin="round"/>
    <polygon points="700.0,318.0 736.4,339.0 736.4,381.0 700.0,402.0 663.6,381.0 663.6,339.0" fill="url(#g2)" opacity="0.22" stroke="url(#g1)" stroke-width="8" stroke-linejoin="round"/>

    <!-- center asterisk -->
    <g stroke="#ffd1ea" stroke-width="10" stroke-linecap="round">
      <line x1="700" y1="332" x2="700" y2="388"/>
      <line x1="676" y1="346" x2="724" y2="374"/>
      <line x1="676" y1="374" x2="724" y2="346"/>
    </g>
  </g>

</svg>